services:
  frontend:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://darktrace:darktrace@postgres:5432/darktrace
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/app:/app/app
    depends_on:
      - postgres
      - neo4j
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: darktrace
      POSTGRES_PASSWORD: darktrace
      POSTGRES_DB: darktrace
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/darktrace-kz-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
  neo4j-data:
